<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vylee</title>

  <meta name="title" content="Vylee">
  <meta name="description" content="Designed to work seamlessly.">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vylee.vercel.app/">
  <meta property="og:title" content="Vylee">
  <meta property="og:description" content="Designed to work seamlessly.">
  <meta property="og:image" content="https://cdn.discordapp.com/attachments/1484490832521461780/1485362781858435192/image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vylee">
  <meta name="twitter:description" content="Designed to work seamlessly.">
  <meta name="twitter:image" content="https://cdn.discordapp.com/attachments/1484490832521461780/1485362781858435192/image.png">

  <link rel="icon" href="/favicon.ico">
  <meta name="theme-color" content="#000000">

  <style>
    @font-face {
      font-family: "Smythe";
      src: url("https://reminders.click/_woff/v2/Smythe-Regular_1/Smythe-Regular_1-english.woff2") format("woff2");
      font-display: swap;
    }

    @font-face {
      font-family: "DM Sans";
      src: url("https://reminders.click/_woff/v2/DMSans_opsz_wght__1/DMSans_opsz_wght__1-english.woff2") format("woff2");
      font-display: swap;
    }

    body {
      margin: 0;
      font-family: "DM Sans", ui-sans-serif, system-ui, sans-serif;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      font-size: 14px;
    }

    .nav-left {
      display: flex;
      gap: 16px;
      font-weight: 500;
      flex-wrap: wrap;
    }

    .nav-left span {
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .nav-left span:hover {
      opacity: 0.6;
    }

    .nav-right {
      display: flex;
      gap: 10px;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid #e5e5e5;
      background: #f5f5f5;
      color: #000;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-btn:hover {
      background: #eaeaea;
    }

    .add-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
    }

    .add-btn:hover svg {
      transform: translate(2px, -2px);
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-family: "Smythe", serif;
      font-size: 44px;
      margin: 0;
    }

    .sub {
      margin-top: 10px;
      font-size: 15px;
      color: #666;
      max-width: 400px;
    }

    .btn {
      margin-top: 28px;
      padding: 14px 26px;
      border-radius: 22px;
      border: 1px solid #e5e5e5;
      background: #f5f5f5;
      cursor: pointer;
    }

    .btn:hover {
      background: #eaeaea;
    }

    .page {
      display: none;
    }

    .active {
      display: flex;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
    }

    .success {
      color: #16a34a;
    }

    .failed {
      color: #dc2626;
    }

    .code-box {
      margin-top: 20px;
      padding: 14px 18px;
      background: #f5f5f5;
      border: 1px solid #eee;
      border-radius: 14px;
      font-size: 14px;
      font-family: monospace;
    }

.overlay {
  position: fixed;
  inset: 0;
  background: transparent;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

    .overlay.show {
      display: flex;
    }

.modal {
  width: 90%;
  max-width: 720px;
  border-radius: 24px;
  padding: 40px;
  background: transprent;
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 0 40px 100px rgba(0, 0, 0, 0.35);
  animation: pop 0.25s ease;
}

    @keyframes pop {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal h1 {
      font-size: 32px;
      margin: 0;
    }

    .modal p {
      margin-top: 12px;
      color: #aaa;
      line-height: 1.6;
    }

    .modal-actions {
      margin-top: 30px;
      display: flex;
      gap: 16px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #5b6cff, #7c8cff);
      color: #fff;
      border: none;
      padding: 14px 22px;
      border-radius: 14px;
      cursor: pointer;
    }

    @media (min-width: 768px) {
      h1 { font-size: 56px; }
      .nav { padding: 20px 40px; }
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="nav-left">
      <span onclick="goDocs()">Docs</span>
      <span onclick="showPayment()">Donate</span>
      <span onclick="goSupport()">Support</span>
    </div>

    <div class="nav-right">
      <button class="add-btn" onclick="addBot()">
        Add Bot
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="add-btn" onclick="openDashboard()">
        Dashboard
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="home" class="container page active">
    <h1>Start building with Vylee</h1>
    <div class="sub">Designed to work seamlessly.</div>
    <button class="btn" onclick="showPayment()">Donate</button>
  </div>

  <div id="payment" class="container page">
    <h1>Complete your donation</h1>
    <div class="code-box">Proceed to secure payment</div>
    <button class="btn" onclick="pay()">Continue</button>
    <div id="status" class="status"></div>
  </div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h1>Under construction</h1>
      <p>
        The dashboard is currently being built. We're working on bringing everything together into a seamless experience.
      </p>

      <div class="modal-actions">
        <button class="btn-primary" onclick="addBot()">Add to your server</button>
      </div>
    </div>
  </div>

  <script>
    function goDocs() {
      window.location.href = "https://vylee.vercel.app/docs";
    }

    function goSupport() {
      window.open("https://discord.gg/Zh6mjGaAFT", "_blank");
    }

    function addBot() {
      window.open("https://discord.com/oauth2/authorize?client_id=1479942416676028579&permissions=8&scope=bot%20applications.commands", "_blank");
    }

    function openDashboard() {
      document.getElementById("overlay").classList.add("show");
    }

    const PAYMENT_LINK = "https://payments.cashfree.com/forms/vylee";

    function showPayment() {
      document.getElementById("home").classList.remove("active");
      document.getElementById("payment").classList.add("active");
    }

    function pay() {
      window.location.href = PAYMENT_LINK;
    }

    function checkStatus() {
      const params = new URLSearchParams(window.location.search);
      const status = params.get("status");
      const el = document.getElementById("status");

      if (status === "success") {
        showPayment();
        el.innerText = "Payment successful.";
        el.className = "status success";
      }

      if (status === "failed") {
        showPayment();
        el.innerText = "Payment failed. Please try again!";
        el.className = "status failed";
      }
    }

    document.getElementById("overlay").addEventListener("click", function (e) {
      if (e.target.id === "overlay") {
        e.target.classList.remove("show");
      }
    });

    checkStatus();
  </script>

</body>
</html>
