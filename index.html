<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vylee</title>

  <meta name="title" content="Vylee">
  <meta name="description" content="Designed to work seamlessly.">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vylee.vercel.app/">
  <meta property="og:title" content="Vylee">
  <meta property="og:description" content="Designed to work seamlessly.">
  <meta property="og:image" content="https://cdn.discordapp.com/attachments/1484490832521461780/1485362781858435192/image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vylee">
  <meta name="twitter:description" content="Designed to work seamlessly.">
  <meta name="twitter:image" content="https://cdn.discordapp.com/attachments/1484490832521461780/1485362781858435192/image.png">

  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      font-size: 14px;
    }

    .nav-left {
      display: flex;
      gap: 16px;
      font-weight: 500;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid #e5e5e5;
      background: #f2f2f2;
      color: #000;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-btn svg {
      width: 16px;
      height: 16px;
    }

    .add-btn:hover {
      background: #e8e8e8;
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      margin: 0;
    }

    .sub {
      margin-top: 10px;
      font-size: 15px;
      color: #666;
    }

    .btn {
      margin-top: 28px;
      padding: 14px 28px;
      border-radius: 24px;
      border: 1px solid #e5e5e5;
      background: #f2f2f2;
      color: #000;
      cursor: pointer;
      font-size: 18px;
    }

    .page { display: none; }
    .active { display: flex; }

    .status { margin-top: 18px; font-size: 14px; }
    .success { color: #16a34a; }
    .failed { color: #dc2626; }
  </style>
</head>

<body>

  <div class="nav">
    <div class="nav-left">
      <span onclick="goDocs()">Docs</span>
      <span onclick="showPayment()">Donate</span>
      <span onclick="goSupport()">Support</span>
    </div>

    <button class="add-btn" onclick="addBot()">
      Add Bot
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div id="home" class="container page active">
    <h1>Start building with Vylee</h1>
    <div class="sub">Designed to work seamlessly.</div>
    <button class="btn" onclick="showPayment()">Donate</button>
  </div>

  <div id="payment" class="container page">
    <h1>Complete your donation</h1>
    <button class="btn" onclick="pay()">Continue</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    function goDocs() {
      window.location.href = "https://vylee.vercel.app/docs";
    }

    function goSupport() {
      window.open("https://discord.gg/2edfghjkh", "_blank");
    }

    function addBot() {
      window.open("https://discord.com/oauth2/authorize?client_id=1479942416676028579", "_blank");
    }

    const PAYMENT_LINK = "https://payments.cashfree.com/forms/vylee";

    function showPayment() {
      document.getElementById("home").classList.remove("active");
      document.getElementById("payment").classList.add("active");
    }

    function pay() {
      window.location.href = PAYMENT_LINK;
    }
  </script>

</body>
</html>
