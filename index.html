<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vylee</title>

  <meta name="title" content="Vylee">
  <meta name="description" content="Designed to work seamlessly.">

  <link rel="icon" href="/favicon.ico">
  <meta name="theme-color" content="#000000">

  <style>
    @font-face {
      font-family: "Smythe";
      src: url("https://reminders.click/_woff/v2/Smythe-Regular_1/Smythe-Regular_1-english.woff2") format("woff2");
    }

    @font-face {
      font-family: "DM Sans";
      src: url("https://reminders.click/_woff/v2/DMSans_opsz_wght__1/DMSans_opsz_wght__1-english.woff2") format("woff2");
    }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    button {
      all: unset;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      color: inherit;
    }

    button:focus,
    button:active {
      outline: none;
    }

    button:active {
      transform: scale(0.96);
    }

    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      font-size: 14px;
    }

    .nav-left {
      display: flex;
      gap: 16px;
      font-weight: 500;
      flex-wrap: wrap;
    }

    .nav-left span {
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .nav-left span:hover {
      opacity: 0.6;
    }

    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      background: #f5f5f5;
      font-size: 13px;
      transition: 0.2s;
    }

    .add-btn:hover {
      background: #eaeaea;
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 20px;
    }

    h1 {
      font-family: "Smythe", serif;
      font-size: 44px;
      margin: 0;
      line-height: 1.15;
    }

    .sub {
      margin-top: 10px;
      font-size: 15px;
      color: #666;
      max-width: 400px;
    }

    .install-pill {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f3f3f3;
      border-radius: 12px;
      padding: 10px 14px;
      max-width: 560px;
      width: 100%;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .install-pill code {
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
      transition: 0.2s;
    }

    .copy-btn:hover {
      opacity: 1;
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
    }

    .btn {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 22px;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      background: #f5f5f5;
      font-size: 15px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #eaeaea;
    }

    .page { display: none; }
    .active { display: flex; }

    .status { margin-top: 18px; font-size: 14px; }
    .success { color: #16a34a; }
    .failed { color: #dc2626; }

    pre {
      margin-top: 20px;
      padding: 12px 16px;
      background: #f5f5f5;
      border-radius: 12px;
      border: 1px solid #eee;
      font-size: 13px;
      overflow-x: auto;
    }

    @media (max-width: 480px) {
      h1 { font-size: 30px; }

      .install-pill {
        padding: 8px 10px;
      }

      .install-pill code {
        font-size: 11.5px;
      }

      .copy-btn svg {
        width: 16px;
        height: 16px;
      }
    }

    @media (min-width: 768px) {
      h1 { font-size: 56px; }
      .nav { padding: 20px 40px; }
      .nav-left { gap: 24px; }
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="nav-left">
      <span onclick="goDocs()">Docs</span>
      <span onclick="showPayment()">Donate</span>
      <span onclick="goSupport()">Support</span>
    </div>

    <button class="add-btn" onclick="addBot()">Dashboard</button>
  </div>

  <div id="home" class="container page active">
    <h1>Start building with Vylee</h1>
    <div class="sub">Designed to work seamlessly.</div>

    <div class="install-pill">
      <code id="inviteLink">
        https://discord.com/oauth2/authorize?client_id=1487882241211109496
      </code>

      <button class="copy-btn" onclick="copyInvite(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 8.25V6a2.25 2.25 0 00-2.25-2.25H6A2.25 2.25 0 003.75 6v8.25A2.25 2.25 0 006 16.5h2.25m8.25-8.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-7.5A2.25 2.25 0 018.25 18v-1.5m8.25-8.25h-6a2.25 2.25 0 00-2.25 2.25v6"/>
        </svg>
      </button>
    </div>

    <button class="btn" onclick="showPayment()">Donate</button>
  </div>

  <div id="payment" class="container page">
    <h1>Complete your donation</h1>
    <pre><code>Proceed to secure payment</code></pre>
    <button class="btn" onclick="pay()">Continue</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    function goDocs() {
      window.location.href = "https://vylee.vercel.app/docs";
    }

    function goSupport() {
      window.open("https://discord.gg/Zh6mjGaAFT", "_blank");
    }

    function addBot() {
      window.open("https://dash.guard.app/");
    }

    const PAYMENT_LINK = "https://payments.cashfree.com/forms/vylee";

    function showPayment() {
      document.getElementById("home").classList.remove("active");
      document.getElementById("payment").classList.add("active");
    }

    function pay() {
      window.location.href = PAYMENT_LINK;
    }

    function copyInvite(btn) {
      const text = document.getElementById("inviteLink").innerText;
      navigator.clipboard.writeText(text);

      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      `;

      setTimeout(() => {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16.5 8.25V6a2.25 2.25 0 00-2.25-2.25H6A2.25 2.25 0 003.75 6v8.25A2.25 2.25 0 006 16.5h2.25m8.25-8.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-7.5A2.25 2.25 0 018.25 18v-1.5m8.25-8.25h-6a2.25 2.25 0 00-2.25 2.25v6"/>
          </svg>
        `;
      }, 1400);
    }
  </script>

</body>
</html>
