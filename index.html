<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vylee</title>

  <meta name="title" content="Vylee">
  <meta name="description" content="Designed to work seamlessly.">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vylee.vercel.app/">
  <meta property="og:title" content="Vylee">
  <meta property="og:description" content="Designed to work seamlessly.">
  <meta property="og:image" content="https://cdn.discordapp.com/attachments/1484490832521461780/1485362781858435192/image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://vylee.vercel.app/">
  <meta name="twitter:title" content="Vylee">
  <meta name="twitter:description" content="Designed to work seamlessly.">
  <meta name="twitter:image" content="https://cdn.discordapp.com/attachments/1484490832521461780/1485362781858435192/image.png">

  <link rel="icon" href="/favicon.ico">
  <meta name="theme-color" content="#000000">

  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      font-size: 14px;
    }

    .nav-left {
      display: flex;
      gap: 16px;
      font-weight: 500;
      flex-wrap: wrap;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #e5e5e5;
      background: #000;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-btn svg {
      width: 14px;
      height: 14px;
    }

    .add-btn:hover {
      opacity: 0.85;
    }

    .add-btn:active {
      transform: scale(0.96);
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      margin: 0;
      line-height: 1.2;
    }

    .sub {
      margin-top: 10px;
      font-size: 15px;
      color: #666;
      max-width: 400px;
    }

    .btn {
      margin-top: 28px;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      background: #f5f5f5;
      color: #000;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }

    .btn:hover {
      background: #eaeaea;
    }

    .btn:active,
    .btn:focus {
      background: #f5f5f5;
      color: #000;
      outline: none;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      display: none;
    }

    .active {
      display: flex;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
    }

    .success {
      color: #16a34a;
    }

    .failed {
      color: #dc2626;
    }

    pre {
      margin-top: 20px;
      padding: 12px 16px;
      background: #f5f5f5;
      border-radius: 12px;
      border: 1px solid #eee;
      font-size: 13px;
      overflow-x: auto;
    }

    code {
      font-family: monospace;
    }

    @media (max-width: 480px) {
      .nav-left span {
        font-size: 17px;
        letter-spacing: -0.01em;
      }

      h1 {
        font-size: 26px;
      }
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 44px;
      }

      .sub {
        font-size: 16px;
      }

      .nav {
        padding: 20px 40px;
      }

      .nav-left {
        gap: 24px;
      }

      .btn {
        font-size: 15px;
        padding: 12px 22px;
      }
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="nav-left">
      <span onclick="goDocs()">Docs</span>
      <span onclick="showPayment()">Donate</span>
      <span onclick="goSupport()">Support</span>
    </div>

    <button class="add-btn" onclick="addBot()">
      Add Bot
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div id="home" class="container page active">
    <h1>Start building with Vylee</h1>
    <div class="sub">Designed to work seamlessly.</div>
    <button class="btn" onclick="showPayment()">Donate</button>
  </div>

  <div id="payment" class="container page">
    <h1>Complete your donation</h1>
    <pre><code>Proceed to secure payment</code></pre>
    <button class="btn" onclick="pay()">Continue</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    function goDocs() {
      window.location.href = "https://vylee.vercel.app/docs";
    }

    function goSupport() {
      window.open("https://discord.gg/2edfghjkh", "_blank");
    }

    function addBot() {
      window.open("https://discord.com/oauth2/authorize?client_id=1479942416676028579", "_blank");
    }

    const PAYMENT_LINK = "https://payments.cashfree.com/forms/vylee";

    function showPayment() {
      document.getElementById("home").classList.remove("active");
      document.getElementById("payment").classList.add("active");
    }

    function pay() {
      window.location.href = PAYMENT_LINK;
    }

    function checkStatus() {
      const params = new URLSearchParams(window.location.search);
      const status = params.get("status");
      const el = document.getElementById("status");

      if (status === "success") {
        showPayment();
        el.innerText = "Payment successful.";
        el.className = "status success";
      }

      if (status === "failed") {
        showPayment();
        el.innerText = "Payment failed. Please try again!";
        el.className = "status failed";
      }
    }

    checkStatus();
  </script>

</body>
</html>
